name: Daily Deal Scraper

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: scraper/url_cache.json
          key: url-cache-${{ runner.os }}
          restore-keys: url-cache-

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scraper/scrape.py

      - name: Save cache
        uses: actions/cache@v3
        with:
          path: scraper/url_cache.json
          key: url-cache-${{ runner.os }}

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add _data/deals.json
          git diff --staged --quiet || git commit -m "auto: update deals $(date +'%Y.%m.%d')"
          git push
